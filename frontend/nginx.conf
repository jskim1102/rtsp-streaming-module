# rtsp-streaming Frontend — Nginx 설정 (컨테이너 내부 /etc/nginx/conf.d/default.conf)
# Vite 빌드 산출물(/usr/share/nginx/html)을 정적 서빙하고, SPA fallback 으로
# 단일 페이지 앱이 새로고침/직접접속 시에도 index.html 을 반환하도록 한다.

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # gzip — 텍스트 자산 전송량 감소
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css application/javascript application/json image/svg+xml;

    # ─── 정적 자산 (Vite 는 파일명에 content hash 를 넣으므로 장기 캐시 안전) ───
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ─── SPA fallback ───
    # 파일이 없는 경로로 직접 접속/새로고침해도 index.html 을 반환한다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 자체는 캐시하지 않음 — 배포 직후 사용자가 최신 번들을 받도록
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
