# rtsp-streaming v2 — MediaMTX 설정 (RTSP ingest + 조건부 transcode + WebRTC/WHEP)
# docker-compose 에서 컨테이너의 `/mediamtx.yml` 경로로 볼륨 마운트된다.
# 대상 이미지: bluenviron/mediamtx:1.19.1-ffmpeg (runOnDemand 가 ffmpeg/ffprobe 호출).
#
# 이 모듈이 MediaMTX 로 하는 일:
#   1) Backend(FastAPI) 가 API(:9997)로 path 를 동적 등록/삭제/조회
#      — POST   /v3/config/paths/add/{name}    (runOnDemand transcode 커맨드로 등록)
#      — DELETE /v3/config/paths/delete/{name}
#      — GET    /v3/paths/get/{name}           (active/readers stats)
#   2) path 접속(WHEP) 시에만 runOnDemand ffmpeg 가 RTSP pull + 조건부 transcode
#   3) 브라우저가 WebRTC(WHEP, :8893) 로 재생
# per-camera path 는 전부 API 동적 등록 — 여기 paths 는 비워둔다.

# ── 로깅 ──
logLevel: info
logDestinations: [stdout]

# ── 인증 (Auth) ──
# 기본은 API 를 127.0.0.1 에서만 허용 → Docker bridge 의 backend 컨테이너(172.x)가
# 401 난다. "아무나 모든 액션" — 개발 편의. 배포 시 IP 제한 + 비밀번호 권장.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics
      - action: pprof

# ── API 서버 (Backend 가 path 동적 등록/삭제/조회) ──
api: yes
apiAddress: :9997
apiAllowOrigins: ['*']

# ── RTSP 서버 (runOnDemand transcode 결과 ingest) ──
rtsp: yes
rtspAddress: :8554

# ── WebRTC 서버 (WHEP 브라우저 재생) ──
# ⚠ 포트 advertise 미스매치 회피 — 할당포트를 직접 박고 host=container 동일매핑.
#   default(8889/8189) 쓰면 mediamtx 가 8189 광고 → 클라가 못 닿음.
# webrtcAdditionalHosts: 컨테이너 배포 #1 gotcha — 공인 IP 를 광고해야 외부
#   브라우저가 ICE 로 닿는다. mediamtx 는 이 YAML 안에서 ${VAR} 를 치환하지 않으므로
#   여기엔 빈 목록을 두고, compose 가 MTX_WEBRTCADDITIONALHOSTS env 로 override 한다
#   (mediamtx 의 유일한 env 주입 경로 = MTX_<PARAM>, 리스트는 콤마구분).
webrtc: yes
webrtcAddress: :8893
webrtcEncryption: no
webrtcLocalUDPAddress: :8193
webrtcAllowOrigins: ['*']
webrtcAdditionalHosts: []

# ── 사용하지 않는 프로토콜 비활성화 ──
hls: no
rtmp: no
srt: no
moq: no
playback: no
metrics: no
pprof: no

# ── path 기본값 — runOnDemand on-demand lifecycle ──
# per-camera runOnDemand 커맨드는 Backend 가 API payload 로 등록한다(패턴 C).
# 여기선 on-demand 종료/시작 타임아웃 기본값만 둔다.
pathDefaults:
  runOnDemandCloseAfter: 10s
  runOnDemandStartTimeout: 10s

# ── 경로 (Paths) — 전부 API 동적 관리 ──
paths: {}
